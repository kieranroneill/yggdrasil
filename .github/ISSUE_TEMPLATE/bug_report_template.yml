name: "\U0001F41B Bug Report"
description: "File a bug report"
title: "[Bug]: "
labels: ["\U0001F41B bug"]
assignees:
  - kieranroneill
body:
  # welcome
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report, all issues are welcome and remember, you're awesome!
  # contact
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com, @githubusername
    validations:
      required: false
  # version
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of the software are you running?
      options:
        - 1.0.0
    validations:
      required: true
  # browser
  - type: dropdown
    id: browsers
    attributes:
      label: What platform are you seeing the problem on?
      multiple: true
      options:
        - Linux
        - MacOS
    validations:
      required: true
  # description
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A detailed description of what is occurring.
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  # steps to reproduce
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Use a simple bulleted pointed list of the steps to reproduce.
      placeholder: "* Light a small spark..."
    validations:
        required: false
