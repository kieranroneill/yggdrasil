name: "Release"

on:
  push:
    branches:
      - beta
      - main

jobs:
  release:
    name: "Release"
    permissions:
      contents: write # to be able to publish a github release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: "🛎 Checkout"
        uses: actions/checkout@v4
      - name: "📦 Install yq" # used to update the issue template
        uses: ./.github/actions/install-yq
      - name: "🦫 Install Go dependencies"
        uses: ./.github/actions/use-go-dependencies
      - name: "📦 Install Node dependencies"
        uses: ./.github/actions/use-pnpm-dependencies
      - name: "📦 Install semantic release"
        run: |
          pnpm add -g semantic-release @semantic-release/{changelog,commit-analyzer,exec,git,github,release-notes-generator}
      - name: "🔖 Release"
        env:
          # appears on the release commits
          GIT_AUTHOR_NAME: kieranroneill
          GIT_AUTHOR_EMAIL: hello@kieranoneill.com
          GIT_COMMITTER_NAME: kieranroneill
          GIT_COMMITTER_EMAIL: hello@kieranoneill.com
          # used to push the release commit and create the tags
          GITHUB_TOKEN: ${{ secrets.READ_AND_WRITE_REPOS_TOKEN }}
        run: pnpm exec semantic-release
